<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureCorp — Database Search</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <nav class="navbar">
        <div class="nav-inner">
            <a href="/" class="nav-brand">
                <div class="brand-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    </svg>
                </div>
                <span>Secure<strong>Corp</strong></span>
            </a>
            <div class="nav-links">
                <a href="/" class="nav-link">Home</a>
                <a href="/login" class="nav-link">Login</a>
                <a href="/search" class="nav-link active">Search</a>
                <a href="/comments" class="nav-link">Feedback</a>
                <a href="/admin" class="nav-link nav-link-admin">Admin</a>
            </div>
        </div>
    </nav>

    <div class="page-container wide">
        <div class="glass-card">
            <div class="card-icon">
                <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/>
                    <path d="M21 21l-4.35-4.35"/>
                </svg>
            </div>
            <h1 class="card-title">Knowledge Base Search</h1>
            <p class="card-subtitle">Search the SecureCorp enterprise knowledge base</p>

            <form id="searchForm" onsubmit="return handleSearch(event)">
                <div style="display: flex; gap: 12px;">
                    <input type="text" id="searchQuery" class="form-input" placeholder="Enter search query..." style="flex: 1;" required>
                    <button type="submit" class="btn btn-primary" id="searchBtn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                        Search
                    </button>
                </div>
            </form>

            <!-- Query Log -->
            <div style="margin-top: 16px; font-size: 12px; color: var(--text-dim); font-family: var(--mono);">
                Queries executed: <span id="queryCount" style="color: var(--accent); font-weight: 700;">0</span>
                &nbsp;|&nbsp;
                Last query: <span id="lastQuery" style="color: var(--text-muted);">—</span>
            </div>

            <!-- Results -->
            <div id="resultsContainer" style="margin-top: 28px;">
                <div style="text-align: center; padding: 40px; color: var(--text-dim);">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity: 0.3; margin-bottom: 12px;">
                        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
                    </svg>
                    <p>Enter a search query to explore the knowledge base</p>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2026 SecureCorp — CogSOC AI Test Target</p>
    </footer>

    <script>
        let queryCount = 0;

        async function handleSearch(e) {
            e.preventDefault();
            const q = document.getElementById('searchQuery').value;
            const container = document.getElementById('resultsContainer');

            queryCount++;
            document.getElementById('queryCount').textContent = queryCount;
            document.getElementById('lastQuery').textContent = q.substring(0, 60);

            container.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-dim);">Searching...</div>';

            try {
                const res = await fetch('/api/search?q=' + encodeURIComponent(q));
                const data = await res.json();

                if (data.results && data.results.length > 0) {
                    let html = `<div style="font-size:13px;color:var(--text-muted);margin-bottom:16px;">
                        Found <strong style="color:var(--accent);">${data.count}</strong> results for 
                        "<strong style="color:#fff;">${data.query}</strong>"
                    </div><ul class="results-list">`;

                    data.results.forEach(r => {
                        html += `<li class="result-item">
                            <div class="result-title">${r.title}</div>
                            <div class="result-snippet">${r.snippet}</div>
                        </li>`;
                    });
                    html += '</ul>';
                    container.innerHTML = html;
                } else {
                    container.innerHTML = '<div style="text-align:center;padding:30px;color:var(--text-dim);">No results found.</div>';
                }
            } catch (err) {
                container.innerHTML = '<div class="alert alert-error">Search request failed</div>';
            }
        }
    </script>
</body>
</html>
