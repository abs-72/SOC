<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureCorp — User Feedback</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <nav class="navbar">
        <div class="nav-inner">
            <a href="/" class="nav-brand">
                <div class="brand-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    </svg>
                </div>
                <span>Secure<strong>Corp</strong></span>
            </a>
            <div class="nav-links">
                <a href="/" class="nav-link">Home</a>
                <a href="/login" class="nav-link">Login</a>
                <a href="/search" class="nav-link">Search</a>
                <a href="/comments" class="nav-link active">Feedback</a>
                <a href="/admin" class="nav-link nav-link-admin">Admin</a>
            </div>
        </div>
    </nav>

    <div class="page-container wide">
        <div class="glass-card">
            <div class="card-icon">
                <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
                </svg>
            </div>
            <h1 class="card-title">User Feedback</h1>
            <p class="card-subtitle">Share your thoughts with the SecureCorp team</p>

            <div id="alertBox" class="alert"></div>

            <form id="commentForm" onsubmit="return handleComment(event)">
                <div class="form-group">
                    <label class="form-label" for="name">Your Name</label>
                    <input type="text" id="name" class="form-input" placeholder="Enter your name" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="comment">Comment</label>
                    <textarea id="comment" class="form-input" placeholder="Write your feedback here..." rows="4" required></textarea>
                </div>
                <button type="submit" class="btn btn-success" style="width:100%; justify-content:center;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                    Submit Feedback
                </button>
            </form>
        </div>

        <!-- Comments Feed -->
        <div style="margin-top: 32px;">
            <h2 style="font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 16px;">
                Recent Feedback
                <span id="commentCount" style="font-size: 14px; color: var(--text-muted); font-weight: 400;"></span>
            </h2>
            <div id="commentsFeed">
                <div style="text-align: center; padding: 30px; color: var(--text-dim); font-size: 14px;">
                    Loading comments...
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2026 SecureCorp — CogSOC AI Test Target</p>
    </footer>

    <script>
        async function handleComment(e) {
            e.preventDefault();
            const alert = document.getElementById('alertBox');
            const name = document.getElementById('name').value;
            const comment = document.getElementById('comment').value;

            alert.className = 'alert';
            alert.style.display = 'none';

            try {
                const res = await fetch('/api/comment', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, comment })
                });
                const data = await res.json();

                if (data.success) {
                    alert.className = 'alert alert-success';
                    alert.textContent = '✅ Feedback submitted successfully!';
                    alert.style.display = 'block';
                    document.getElementById('comment').value = '';
                    loadComments();
                } else {
                    alert.className = 'alert alert-error';
                    alert.textContent = '❌ ' + data.message;
                    alert.style.display = 'block';
                }
            } catch (err) {
                alert.className = 'alert alert-error';
                alert.textContent = '❌ Server error';
                alert.style.display = 'block';
            }
        }

        async function loadComments() {
            const feed = document.getElementById('commentsFeed');
            try {
                const res = await fetch('/api/comments');
                const data = await res.json();
                const comments = data.comments || [];
                document.getElementById('commentCount').textContent = `(${comments.length})`;

                if (comments.length === 0) {
                    feed.innerHTML = '<div style="text-align:center;padding:30px;color:var(--text-dim);">No feedback yet. Be the first!</div>';
                    return;
                }

                let html = '';
                comments.reverse().forEach(c => {
                    const time = c.time ? new Date(c.time).toLocaleString() : '';
                    html += `<div class="comment-item">
                        <div class="comment-header">
                            <span class="comment-name">${c.name}</span>
                            <span class="comment-time">${time}</span>
                        </div>
                        <div class="comment-text">${c.comment}</div>
                    </div>`;
                });
                feed.innerHTML = html;
            } catch (err) {
                feed.innerHTML = '<div style="text-align:center;padding:20px;color:var(--red);">Failed to load comments</div>';
            }
        }

        loadComments();
    </script>
</body>
</html>
