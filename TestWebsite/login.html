<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureCorp — Employee Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <nav class="navbar">
        <div class="nav-inner">
            <a href="/" class="nav-brand">
                <div class="brand-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    </svg>
                </div>
                <span>Secure<strong>Corp</strong></span>
            </a>
            <div class="nav-links">
                <a href="/" class="nav-link">Home</a>
                <a href="/login" class="nav-link active">Login</a>
                <a href="/search" class="nav-link">Search</a>
                <a href="/comments" class="nav-link">Feedback</a>
                <a href="/admin" class="nav-link nav-link-admin">Admin</a>
            </div>
        </div>
    </nav>

    <div class="page-container">
        <div class="glass-card">
            <div class="card-icon">
                <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0110 0v4"/>
                </svg>
            </div>
            <h1 class="card-title">Employee Login</h1>
            <p class="card-subtitle">Authenticate to access SecureCorp internal resources</p>

            <div id="alertBox" class="alert"></div>

            <form id="loginForm" onsubmit="return handleLogin(event)">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-input" placeholder="Enter your username" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-input" placeholder="Enter your password" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; margin-top:8px;" id="loginBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
                    Sign In
                </button>
            </form>

            <div style="margin-top: 28px; padding-top: 20px; border-top: 1px solid var(--border); text-align: center;">
                <p style="font-size: 12px; color: var(--text-dim);">
                    🔒 All login attempts are logged and monitored by CogSOC AI
                </p>
            </div>
        </div>

        <!-- Attempt counter -->
        <div style="text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-dim); font-family: var(--mono);">
            Login attempts this session: <span id="attemptCount" style="color: var(--accent); font-weight: 700;">0</span>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2026 SecureCorp — CogSOC AI Test Target</p>
    </footer>

    <script>
        let attempts = 0;

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const alert = document.getElementById('alertBox');
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            btn.disabled = true;
            btn.innerHTML = '<span>Authenticating...</span>';
            alert.className = 'alert';
            alert.style.display = 'none';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                attempts++;
                document.getElementById('attemptCount').textContent = attempts;

                if (data.success) {
                    alert.className = 'alert alert-success';
                    alert.textContent = '✅ Authentication successful. Redirecting...';
                    alert.style.display = 'block';
                    setTimeout(() => window.location.href = '/', 1500);
                } else {
                    alert.className = 'alert alert-error';
                    alert.textContent = '❌ ' + (data.message || 'Invalid credentials');
                    alert.style.display = 'block';
                }
            } catch (err) {
                alert.className = 'alert alert-error';
                alert.textContent = '❌ Server connection failed';
                alert.style.display = 'block';
            }

            btn.disabled = false;
            btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> Sign In';
        }
    </script>
</body>
</html>
