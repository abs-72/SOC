<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CogSOC — Secure Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #010308;
            --surface: rgba(10, 15, 26, 0.6);
            --surface-border: rgba(0, 238, 255, 0.2);
            --accent: #00eeff;
            --accent-glow: rgba(0, 238, 255, 0.6);
            --secondary: #7000ff;
            --danger: #ff0055;
            --success: #00ff88;
            --text: #e2e8f0;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ── Live Professional Network Background ── */
        #networkCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            background: radial-gradient(circle at center, #0a0f1d 0%, #010308 100%);
        }

        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }

        /* ── Branding (Static/Normal) ── */
        .brand {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-img {
            width: 150px;
            margin-bottom: 15px;
        }

        .brand h1 {
            font-size: 42px;
            font-weight: 800;
            letter-spacing: -1px;
            color: #ffffff;
            margin-bottom: 5px;
        }
        .brand p {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--accent);
            letter-spacing: 5px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        /* ── Clean Glassmorphism Card (Static) ── */
        .glass-card {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 1px solid rgba(0, 238, 255, 0.3);
            border-radius: 16px;
            padding: 40px 32px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        /* ── View Transitions ── */
        .view-section {
            display: none;
            animation: slideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .view-section.active { display: block; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ── Typography & Links ── */
        .view-title {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 24px;
            text-align: center;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        
        .nav-links {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 24px;
            font-size: 13px;
        }
        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
            cursor: pointer;
        }
        .nav-links a:hover {
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent-glow);
        }

        /* ── Form Elements ── */
        .input-group {
            margin-bottom: 22px;
            position: relative;
        }
        .input-group label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .input-field {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 14px 16px 14px 44px;
            color: white;
            font-size: 15px;
            font-family: 'Outfit', sans-serif;
            transition: all 0.3s ease;
            outline: none;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }
        .input-field::placeholder { color: rgba(255, 255, 255, 0.15); }
        .input-field:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 238, 255, 0.15), inset 0 2px 4px rgba(0,0,0,0.3);
            background: rgba(0, 0, 0, 0.7);
        }

        .input-icon {
            position: absolute;
            left: 16px;
            bottom: 14px;
            color: var(--text-muted);
            font-size: 16px;
            transition: all 0.3s;
        }
        .input-field:focus + .input-icon, .input-field:focus ~ .input-icon {
            color: var(--accent);
            filter: drop-shadow(0 0 5px var(--accent-glow));
        }

        /* ── Action Buttons ── */
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #000;
            margin-top: 10px;
            z-index: 1;
            background: var(--accent);
            box-shadow: 0 0 15px rgba(0, 238, 255, 0.3);
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 30px var(--accent-glow);
            color: #000;
        }
        .btn:active { transform: translateY(1px); }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
            animation: none;
        }

        /* Loading Spinner */
        .btn .spinner {
            display: none;
            width: 22px;
            height: 22px;
            border: 3px solid rgba(0,0,0,0.2);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            position: absolute;
            left: 50%;
            top: 50%;
            margin: -11px 0 0 -11px;
        }
        .btn.loading .text { opacity: 0; }
        .btn.loading .spinner { display: block; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Feedback Messages ── */
        .alert {
            padding: 14px 16px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
            animation: shake 0.4s ease-in-out;
            backdrop-filter: blur(10px);
        }
        .alert.error {
            display: flex;
            background: rgba(255, 0, 85, 0.15);
            border: 1px solid rgba(255, 0, 85, 0.4);
            color: #ff80a6;
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.2);
        }
        .alert.success {
            display: flex;
            background: rgba(0, 255, 136, 0.15);
            border: 1px solid rgba(0, 255, 136, 0.4);
            color: #80ffc3;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
            animation: slideIn 0.3s ease;
        }

        /* ── Local Security Badge ── */
        .security-badge {
            margin-top: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 11px;
            color: var(--accent);
            font-family: 'JetBrains Mono', monospace;
            opacity: 0.6;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .security-badge svg { fill: currentColor; width: 14px; height: 14px; }
    </style>
</head>
<body>

<!-- Live Network Canvas -->
<canvas id="networkCanvas"></canvas>

<div class="login-wrapper">
    <!-- Branding -->
    <div class="brand">
        <img src="logo.png" alt="CogSOC" class="logo-img" onerror="this.style.display='none'">
        <h1>CogSOC</h1>
        <p>AI-Driven Autonomous Defense</p>
    </div>

    <!-- Main Glass Card -->
    <div class="glass-card" id="mainCard">
        
        <!-- =======================
             LOGIN VIEW
        ======================== -->
        <div id="view-login" class="view-section active">
            <h2 class="view-title">Login</h2>
            <div id="msg-login" class="alert"></div>
            
            <form id="form-login">
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="loginUser" class="input-field" placeholder="Username" required>
                    <span class="input-icon">👤</span>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="loginPass" class="input-field" placeholder="••••••••" required>
                    <span class="input-icon">🔒</span>
                </div>
                <button type="submit" class="btn" id="btnLogin">
                    <span class="text">Login</span>
                    <div class="spinner"></div>
                </button>
            </form>
            
            <div class="nav-links">
                <a onclick="switchView('view-forgot')">Forgot Password?</a>
                <span>•</span>
                <a onclick="switchView('view-signup')">Create Account</a>
            </div>
        </div>

        <!-- =======================
             SIGNUP VIEW
        ======================== -->
        <div id="view-signup" class="view-section">
            <h2 class="view-title">Create Account</h2>
            <div id="msg-signup" class="alert"></div>
            
            <form id="form-signup">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="regName" class="input-field" placeholder="John Doe" required>
                    <span class="input-icon">📛</span>
                </div>
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="regUser" class="input-field" placeholder="Choose a username" required minlength="3">
                    <span class="input-icon">👤</span>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="regPass" class="input-field" placeholder="Min 6 characters" required minlength="6">
                    <span class="input-icon">🔑</span>
                </div>
                <div class="input-group">
                    <label>System Recovery Key</label>
                    <input type="text" id="regRecovery" class="input-field" placeholder="Secret phrase for resets" required>
                    <span class="input-icon">🛡️</span>
                </div>
                <button type="submit" class="btn" id="btnSignup">
                    <span class="text">Create Account</span>
                    <div class="spinner"></div>
                </button>
            </form>
            
            <div class="nav-links">
                <a onclick="switchView('view-login')">← Back to Login</a>
            </div>
        </div>

        <!-- =======================
             FORGOT PASSWORD VIEW
        ======================== -->
        <div id="view-forgot" class="view-section">
            <h2 class="view-title">Forgot Password</h2>
            <div id="msg-forgot" class="alert"></div>
            
            <form id="form-forgot">
                <p style="font-size:12px; color:var(--text-muted); margin-bottom:20px; line-height:1.5; font-family:'Outfit', sans-serif;">
                    Enter your username and your secret System Recovery Key to forcibly reset your password.
                </p>
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="forUser" class="input-field" placeholder="Your username" required>
                    <span class="input-icon">👤</span>
                </div>
                <div class="input-group">
                    <label>Recovery Key</label>
                    <input type="text" id="forKey" class="input-field" placeholder="Secret recovery phrase" required>
                    <span class="input-icon">🛡️</span>
                </div>
                <div class="input-group">
                    <label>New Password</label>
                    <input type="password" id="forPass" class="input-field" placeholder="New password" required minlength="6">
                    <span class="input-icon">🔑</span>
                </div>
                <button type="submit" class="btn" id="btnForgot">
                    <span class="text">Reset Password</span>
                    <div class="spinner"></div>
                </button>
            </form>
            
            <div class="nav-links">
                <a onclick="switchView('view-login')">← Back to Login</a>
            </div>
        </div>

    </div>

    <!-- Badge -->
    <div class="security-badge">
        <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
        AES-256 Encrypted • Air-Gapped Capable
    </div>
</div>

<script>
/* ── ULTRA DYNAMIC 3D CONSTELLATION CANVAS ── */
const canvas = document.getElementById('networkCanvas');
const ctx = canvas.getContext('2d');
let width, height;
let nodes = [];
let mouse = { x: -1000, y: -1000, radius: 150 };

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

class Node {
    constructor(isForeground) {
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.z = isForeground ? 1.5 : 0.5; // Parallax depth
        this.vx = (Math.random() - 0.5) * this.z;
        this.vy = (Math.random() - 0.5) * this.z;
        this.radius = (Math.random() * 2 + 1) * this.z;
        this.color = Math.random() > 0.8 ? '112, 0, 255' : '0, 238, 255'; // Purple or Cyan
        this.pulse = Math.random() * Math.PI * 2;
    }
    update() {
        // Normal movement
        this.x += this.vx;
        this.y += this.vy;
        
        // Bounce off walls
        if (this.x < 0 || this.x > width) this.vx *= -1;
        if (this.y < 0 || this.y > height) this.vy *= -1;

        // Mouse interaction (Magnetic repel)
        let dx = mouse.x - this.x;
        let dy = mouse.y - this.y;
        let dist = Math.sqrt(dx * dx + dy * dy);
        
        if (dist < mouse.radius) {
            let forceDirectionX = dx / dist;
            let forceDirectionY = dy / dist;
            let force = (mouse.radius - dist) / mouse.radius;
            // Repel slowly
            this.x -= forceDirectionX * force * 2 * this.z;
            this.y -= forceDirectionY * force * 2 * this.z;
        }
        
        this.pulse += 0.05;
    }
    draw() {
        let currentRadius = this.radius + Math.sin(this.pulse) * 0.5;
        
        ctx.beginPath();
        ctx.arc(this.x, this.y, currentRadius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${this.color}, ${this.z === 1.5 ? 0.8 : 0.3})`;
        ctx.shadowBlur = this.z === 1.5 ? 10 : 0;
        ctx.shadowColor = `rgb(${this.color})`;
        ctx.fill();
        ctx.shadowBlur = 0;
    }
}

// Generate Nodes
function initNodes() {
    nodes = [];
    let count = Math.floor(width / 12);
    for (let i = 0; i < count; i++) {
        nodes.push(new Node(i % 3 === 0)); // 1/3 are foreground
    }
}
initNodes();

function animate() {
    // Trailing effect for smooth motion
    ctx.fillStyle = 'rgba(5, 8, 15, 0.4)';
    ctx.fillRect(0, 0, width, height);
    
    // Update and draw nodes
    for (let i = 0; i < nodes.length; i++) {
        nodes[i].update();
        nodes[i].draw();
        
        // Draw connections
        for (let j = i + 1; j < nodes.length; j++) {
            const dx = nodes[i].x - nodes[j].x;
            const dy = nodes[i].y - nodes[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            
            // Connect close nodes
            let maxDist = nodes[i].z === 1.5 && nodes[j].z === 1.5 ? 180 : 100;
            
            if (dist < maxDist) {
                ctx.beginPath();
                ctx.moveTo(nodes[i].x, nodes[i].y);
                ctx.lineTo(nodes[j].x, nodes[j].y);
                let alpha = (1 - dist / maxDist) * (nodes[i].z === 1.5 ? 0.4 : 0.1);
                ctx.strokeStyle = `rgba(0, 238, 255, ${alpha})`;
                ctx.lineWidth = nodes[i].z === 1.5 ? 1 : 0.5;
                ctx.stroke();
                
                // Data Packet travelling along line (rare)
                if (Math.random() > 0.99) {
                    let travelX = nodes[i].x + dx * 0.5;
                    let travelY = nodes[i].y + dy * 0.5;
                    ctx.beginPath();
                    ctx.arc(travelX, travelY, 2, 0, Math.PI * 2);
                    ctx.fillStyle = '#fff';
                    ctx.fill();
                }
            }
        }
        
        // Draw connection to mouse
        let mDx = mouse.x - nodes[i].x;
        let mDy = mouse.y - nodes[i].y;
        let mDist = Math.sqrt(mDx * mDx + mDy * mDy);
        if (mDist < 200) {
            ctx.beginPath();
            ctx.moveTo(nodes[i].x, nodes[i].y);
            ctx.lineTo(mouse.x, mouse.y);
            ctx.strokeStyle = `rgba(112, 0, 255, ${0.3 * (1 - mDist/200)})`;
            ctx.lineWidth = 1;
            ctx.stroke();
        }
    }
    requestAnimationFrame(animate);
}
animate();

window.addEventListener('mousemove', (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});
window.addEventListener('mouseout', () => {
    mouse.x = -1000;
    mouse.y = -1000;
});

/* ── UI Logic ── */
function switchView(viewId) {
    document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
    document.getElementById(viewId).classList.add('active');
    
    const card = document.getElementById('mainCard');
    card.style.transform = 'scale(0.95)';
    setTimeout(() => card.style.transform = 'scale(1)', 150);
    
    document.querySelectorAll('.alert').forEach(el => el.style.display = 'none');
}

function showMsg(id, text, isError) {
    const el = document.getElementById(id);
    el.textContent = (isError ? '⚠️ ' : '✅ ') + text;
    el.className = 'alert ' + (isError ? 'error' : 'success');
    el.style.display = 'flex';
}

function setLoading(btnId, isLoading) {
    const btn = document.getElementById(btnId);
    if(isLoading) {
        btn.classList.add('loading');
        btn.disabled = true;
    } else {
        btn.classList.remove('loading');
        btn.disabled = false;
    }
}

/* ── API Calls ── */
document.getElementById('form-login').addEventListener('submit', async (e) => {
    e.preventDefault();
    const u = document.getElementById('loginUser').value.trim();
    const p = document.getElementById('loginPass').value;
    
    setLoading('btnLogin', true);
    try {
        const res = await fetch('/auth/login', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({username: u, password: p})
        });
        const data = await res.json();
        if(data.success) {
            showMsg('msg-login', 'Authentication sequence accepted.', false);
            document.cookie = `cogsoc_token=${data.token}; path=/; max-age=86400; SameSite=Strict`;
            setTimeout(() => window.location.href = '/gateway.html', 800);
        } else {
            showMsg('msg-login', data.message || 'Access Denied.', true);
        }
    } catch(err) { showMsg('msg-login', 'Server connection lost.', true); }
    finally { setLoading('btnLogin', false); }
});

document.getElementById('form-signup').addEventListener('submit', async (e) => {
    e.preventDefault();
    const n = document.getElementById('regName').value.trim();
    const u = document.getElementById('regUser').value.trim();
    const p = document.getElementById('regPass').value;
    const key = document.getElementById('regRecovery').value.trim();
    
    setLoading('btnSignup', true);
    try {
        const res = await fetch('/auth/signup', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({username: u, password: p, full_name: n, recovery_key: key})
        });
        const data = await res.json();
        if(data.success) {
            showMsg('msg-signup', 'Deployment authorized! Switch to login.', false);
            setTimeout(() => { switchView('view-login'); document.getElementById('loginUser').value = u; }, 1500);
        } else {
            showMsg('msg-signup', data.message || 'Registration failed.', true);
        }
    } catch(err) { showMsg('msg-signup', 'Server connection lost.', true); }
    finally { setLoading('btnSignup', false); }
});

document.getElementById('form-forgot').addEventListener('submit', async (e) => {
    e.preventDefault();
    const u = document.getElementById('forUser').value.trim();
    const key = document.getElementById('forKey').value.trim();
    const p = document.getElementById('forPass').value;
    
    setLoading('btnForgot', true);
    try {
        const res = await fetch('/auth/reset', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({username: u, recovery_key: key, new_password: p})
        });
        const data = await res.json();
        if(data.success) {
            showMsg('msg-forgot', 'Password forcefully reset! Switch to login.', false);
            document.getElementById('form-forgot').reset();
            setTimeout(() => switchView('view-login'), 2000);
        } else {
            showMsg('msg-forgot', data.message || 'Invalid recovery sequence.', true);
        }
    } catch(err) { showMsg('msg-forgot', 'Server connection lost.', true); }
    finally { setLoading('btnForgot', false); }
});
</script>
</body>
</html>
