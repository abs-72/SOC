input {
  # NetFlow v9 (existing)
  udp {
    port => 2055
    codec => netflow
  }

  # Filebeat input — receives from BOTH Windows & Linux sensors
  beats {
    port => 5044
  }

  # Direct Python/JSON ingestion (for scripts that send data directly)
  tcp {
    port => 5055
    codec => json
  }
}

filter {
  if [log_type] == "cicflowmeter" {
    # Parse CSV line into CICFlowMeter feature columns
    csv {
      separator => ","
      columns => [
        "Flow ID", "Src IP", "Src Port", "Dst IP", "Dst Port", "Protocol",
        "Timestamp", "Flow Duration", "Total Fwd Packet", "Total Bwd packets",
        "Total Length of Fwd Packet", "Total Length of Bwd Packet",
        "Fwd Packet Length Max", "Fwd Packet Length Min",
        "Fwd Packet Length Mean", "Fwd Packet Length Std",
        "Bwd Packet Length Max", "Bwd Packet Length Min",
        "Bwd Packet Length Mean", "Bwd Packet Length Std",
        "Flow Bytes/s", "Flow Packets/s",
        "Flow IAT Mean", "Flow IAT Std", "Flow IAT Max", "Flow IAT Min",
        "Fwd IAT Total", "Fwd IAT Mean", "Fwd IAT Std", "Fwd IAT Max", "Fwd IAT Min",
        "Bwd IAT Total", "Bwd IAT Mean", "Bwd IAT Std", "Bwd IAT Max", "Bwd IAT Min",
        "Fwd PSH Flags", "Bwd PSH Flags", "Fwd URG Flags", "Bwd URG Flags",
        "Fwd Header Length", "Bwd Header Length", "Fwd Packets/s", "Bwd Packets/s",
        "Packet Length Min", "Packet Length Max", "Packet Length Mean",
        "Packet Length Std", "Packet Length Variance",
        "FIN Flag Count", "SYN Flag Count", "RST Flag Count",
        "PSH Flag Count", "ACK Flag Count", "URG Flag Count",
        "CWR Flag Count", "ECE Flag Count", "Down/Up Ratio",
        "Pkt Size Avg", "Fwd Segment Size Avg", "Bwd Segment Size Avg",
        "Fwd Header Length.1",
        "Fwd Bytes/Bulk Avg", "Fwd Packet/Bulk Avg", "Fwd Bulk Rate Avg",
        "Bwd Bytes/Bulk Avg", "Bwd Packet/Bulk Avg", "Bwd Bulk Rate Avg",
        "Subflow Fwd Packets", "Subflow Fwd Bytes",
        "Subflow Bwd Packets", "Subflow Bwd Bytes",
        "FWD Init Win Bytes", "Bwd Init Win Bytes",
        "Fwd Act Data Pkts", "Fwd Seg Size Min",
        "Active Mean", "Active Std", "Active Max", "Active Min",
        "Idle Mean", "Idle Std", "Idle Max", "Idle Min",
        "Label"
      ]
      skip_header => true
    }

    # Convert key numeric fields
    mutate {
      convert => {
        "Dst Port"           => "integer"
        "Flow Duration"      => "float"
        "Total Fwd Packet"   => "float"
        "Total Bwd packets"  => "float"
        "Flow Bytes/s"       => "float"
        "Flow Packets/s"     => "float"
        "SYN Flag Count"     => "float"
        "RST Flag Count"     => "float"
        "FIN Flag Count"     => "float"
      }
    }

    # Tag sensor source — sensor_name comes from Filebeat fields
    # Filebeat sets sensor_name via fields_under_root, keep it and copy
    if [sensor_name] {
      mutate {
        copy => { "sensor_name" => "source_sensor" }
      }
    } else {
      mutate {
        add_field => { "sensor_name" => "unknown" }
        add_field => { "source_sensor" => "unknown" }
      }
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "cogsoc-flows-%{+YYYY.MM.dd}"
  }
  stdout { codec => rubydebug }
}