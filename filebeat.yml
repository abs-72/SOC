filebeat.inputs:
- type: filestream
  id: cicflowmeter-daily
  enabled: true
  paths:
    - C:\CogSOC\CICFlowMeter-master\build\distributions\CICFlowMeter-4.0\bin\data\daily\*_Flow.csv
  prospector.scanner.check_interval: 5s
  file_identity.native: ~
  exclude_lines: ['^Flow ID', '^"Flow ID', '^Src IP', '^"Src IP']
  fields:
    source_type: cogsoc
  fields_under_root: true

processors:
- decode_csv_fields:
    fields:
      message: csv
    separator: ","
    trim_leading_space: true
    overwrite_keys: false
    fail_on_error: false

- script:
    lang: javascript
    id: map_csv_fields
    source: >
      function process(event) {
        var csv = event.Get("csv");
        if (!csv || csv.length < 10) return;
        var cols = [
          "Flow ID","Src IP","Src Port","Dst IP","Dst Port","Protocol","Timestamp",
          "Flow Duration","Total Fwd Packet","Total Bwd packets",
          "Total Length of Fwd Packet","Total Length of Bwd Packet",
          "Fwd Packet Length Max","Fwd Packet Length Min",
          "Fwd Packet Length Mean","Fwd Packet Length Std",
          "Bwd Packet Length Max","Bwd Packet Length Min",
          "Bwd Packet Length Mean","Bwd Packet Length Std",
          "Flow Bytes/s","Flow Packets/s",
          "Flow IAT Mean","Flow IAT Std","Flow IAT Max","Flow IAT Min",
          "Fwd IAT Total","Fwd IAT Mean","Fwd IAT Std","Fwd IAT Max","Fwd IAT Min",
          "Bwd IAT Total","Bwd IAT Mean","Bwd IAT Std","Bwd IAT Max","Bwd IAT Min",
          "Fwd PSH Flags","Bwd PSH Flags","Fwd URG Flags","Bwd URG Flags",
          "Fwd Header Length","Bwd Header Length","Fwd Packets/s","Bwd Packets/s",
          "Packet Length Min","Packet Length Max","Packet Length Mean",
          "Packet Length Std","Packet Length Variance",
          "FIN Flag Count","SYN Flag Count","RST Flag Count","PSH Flag Count",
          "ACK Flag Count","URG Flag Count","CWR Flag Count","ECE Flag Count",
          "Down/Up Ratio","Pkt Size Avg","Fwd Segment Size Avg","Bwd Segment Size Avg",
          "Fwd Bytes/Bulk Avg","Fwd Packet/Bulk Avg","Fwd Bulk Rate Avg",
          "Bwd Bytes/Bulk Avg","Bwd Packet/Bulk Avg","Bwd Bulk Rate Avg",
          "Subflow Fwd Packets","Subflow Fwd Bytes",
          "Subflow Bwd Packets","Subflow Bwd Bytes",
          "FWD Init Win Bytes","Bwd Init Win Bytes",
          "Fwd Act Data Pkts","Fwd Seg Size Min",
          "Active Mean","Active Std","Active Max","Active Min",
          "Idle Mean","Idle Std","Idle Max","Idle Min","Label"
        ];
        for (var i = 0; i < cols.length && i < csv.length; i++) {
          var val = csv[i];
          if (val !== null && val !== "") {
            event.Put(cols[i], val);
          }
        }
        event.Delete("csv");
        event.Delete("message");
        event.Delete("decoded");
      }

- drop_fields:
    fields: ["log", "input", "agent", "ecs", "host"]
    ignore_missing: true

output.elasticsearch:
  hosts: ["http://172.19.201.62:9200"]
  index: "cogsoc-flows"
  bulk_max_size: 500

setup.ilm.enabled: false
setup.template.enabled: false

logging.level: info
logging.to_files: true
logging.files:
  path: C:\CogSOC\logs
  name: filebeat
  keepfiles: 7